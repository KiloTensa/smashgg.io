name: Deploy to GitHub Pages

on:
  push:
    branches: 'main' # Se ejecutará cada vez que subas cambios a main

# Permisos necesarios para interactuar con GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build # Aquí Vite usará el base: '/smashgg.io/' que configuramos antes

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Sube la carpeta compilada por Vite

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4